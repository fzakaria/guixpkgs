name: Sync upstream Guix

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch: # Allow manual triggers

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GuixPkgs
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Guix
        uses: PromyLOPh/guix-install-action@v1

      - name: Run Sync App
        run: nix run .#sync

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs guix-metadata.json
          
          # Only commit if there are actually changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: Auto-sync Guix pkgs from upstream"
            git push
          else
            echo "No changes to upstream Guix packages detected."
          fi
